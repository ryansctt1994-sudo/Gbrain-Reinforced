version: '3.8'

services:
  mock-mcp:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mock_mcp.py:/app/mock_mcp.py:ro
    command: python mock_mcp.py
    ports:
      - "5000:5000"

  proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REALITY_GATE_PUBKEY_B64=${REALITY_GATE_PUBKEY_B64}
      - UPSTREAM_MCP_URL=http://mock-mcp:5000
    depends_on:
      - mock-mcp

  chaos:
    build: .
    command: python chaos_fuzzer.py --target http://proxy:8080
    environment:
      - REALITY_GATE_PUBKEY_B64=${REALITY_GATE_PUBKEY_B64}
    depends_on:
      - proxy
    profiles:
      - test
